{% extends "base.html" %}
{% block title %}My Account{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <h1>{{ user.username }}</h1>
        <form method="post" action="{{ base }}/user">
            <input type="password" name="oldpassword" placeholder="Current password" required>
            <input type="password" name="password" placeholder="New password" required>
            <input type="submit" class="btn btn-primary btn-block" value="Update password">
        </form>
        <div class="auth-links">
            <a href="{{ base }}/index.html">Back</a> | <a href="{{ base }}/logout">Logout</a>
        </div>
        {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
    </div>
</div>
{% endblock %}
