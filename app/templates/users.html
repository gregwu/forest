{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block body %}
<div class="users-page">
    <div class="users-header">
        Welcome <a href="{{ base }}/user">{{ current_user.username }}</a>! | <a href="{{ base }}/logout">Log out</a>
    </div>
    <div id="msg"></div>
    <table class="users-table">
        <thead>
            <tr>
                <th>Admin</th>
                <th>User name</th>
                <th>Domain</th>
                <th>Export / Import</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr id="user-row-{{ u.id }}">
                <td>
                    <input type="checkbox" {% if u.is_admin %}checked{% endif %}
                           hx-post="{{ base }}/users/{{ u.id }}/role?is_admin={{ (not u.is_admin) | lower }}"
                           hx-swap="none">
                </td>
                <td><a href="{{ base }}/users/{{ u.id }}/login-as" target="_blank">{{ u.username }}</a></td>
                <td>{{ u.domain }}</td>
                <td class="export-import-cell">
                    <a class="btn btn-sm" href="{{ base }}/users/{{ u.id }}/export" title="Export {{ u.username }}'s tree">Export</a>
                    <form method="post" action="{{ base }}/users/{{ u.id }}/import" enctype="multipart/form-data"
                          class="import-form" id="import-form-{{ u.id }}">
                        <input type="file" name="file" accept="application/json" class="import-file-input"
                               onchange="this.form.submit()">
                        <button type="button" class="btn btn-sm" onclick="this.closest('td').querySelector('.import-file-input').click()"
                                title="Import a tree into {{ u.username }}'s account">Import</button>
                    </form>
                </td>
                <td>
                    <span class="deletebtn"
                          hx-delete="{{ base }}/users/{{ u.id }}"
                          hx-target="#user-row-{{ u.id }}"
                          hx-swap="outerHTML"
                          hx-confirm="Delete this user?">
                        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </span>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% if msg %}<script>document.getElementById('msg').textContent = {{ msg | tojson }};</script>{% endif %}
</div>
{% endblock %}
